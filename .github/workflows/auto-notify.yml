name: Kakao API Discord Notify

on:
  schedule:
    # Every 3 hours, at minute :17 (offset from the heavily congested
    # top-of-hour slot to reduce GitHub's scheduling delays/drops):
    # 00:17, 03:17, 06:17, 09:17, 12:17, 15:17, 18:17, 21:17 UTC.
    - cron: "17 */3 * * *"
  workflow_dispatch:

# Least privilege: read repo contents, and write to Actions so this run can
# cancel previously running runs of this workflow before it launches.
permissions:
  contents: read
  actions: write

# No blocking concurrency group on purpose: a new run must be allowed to
# start immediately so its "Cancel previously running workflow runs" step
# can terminate any older run that is still going. The newest run wins.

jobs:
  launch:
    runs-on: ubuntu-latest
    # GitHub kills any job at 6h (360 min). Stay just under that so the
    # run ends cleanly and the next scheduled run can take over.
    timeout-minutes: 359

    steps:
      - name: Cancel previously running workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          WORKFLOW_FILE: auto-notify.yml
        run: |
          set -euo pipefail

          for status in queued in_progress; do
            echo "Checking for previous ${status} workflow runs..."
            gh run list \
              --repo "${GH_REPO}" \
              --workflow "${WORKFLOW_FILE}" \
              --status "${status}" \
              --limit 50 \
              --json databaseId \
              --jq '.[].databaseId' | while read -r run_id; do
                if [ -z "${run_id}" ] || [ "${run_id}" = "${CURRENT_RUN_ID}" ]; then
                  continue
                fi
                echo "Canceling previous ${status} run: ${run_id}"
                gh run cancel "${run_id}" --repo "${GH_REPO}" || true
              done
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements.txt

      - name: Monitor Kakao channel posts every minute
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Mention target. Examples: 123456789012345678, @everyone, @here
          DISCORD_MENTION: ${{ secrets.DISCORD_MENTION }}
          # Backward compatibility. Used only when DISCORD_MENTION is empty.
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          # Kakao channel profile IDs to watch. Target IDs are not hardcoded in the repo.
          # Examples: _channelA,_channelB or multiple lines
          KAKAO_PROFILE_IDS: ${{ secrets.KAKAO_PROFILE_IDS }}
          TIMEZONE: Asia/Seoul
          KAKAO_NOTIFY_ON_BOOTSTRAP: "false"
          CHECK_INTERVAL_SECONDS: "60"
          # 358 minutes: slightly shorter than timeout-minutes: 359 for clean shutdown.
          RUN_DURATION_SECONDS: "21480"
          ERROR_ALERT_COOLDOWN_SECONDS: "1800"
        run: python kakao_monitor.py --loop
