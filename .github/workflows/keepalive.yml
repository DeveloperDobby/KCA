name: Keep GitHub Actions Schedule Alive

on:
  schedule:
    # GitHub Actions scheduled workflows can be disabled after long repository inactivity.
    # This weekly harmless commit keeps repository activity alive.
    - cron: "30 3 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update keepalive timestamp
        run: |
          mkdir -p state
          date -u +"%Y-%m-%dT%H:%M:%SZ" > state/.keepalive

      - name: Commit keepalive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/.keepalive
          if git diff --cached --quiet; then
            echo "No keepalive changes to commit."
            exit 0
          fi
          git commit -m "chore: keep actions schedule alive [skip ci]"
          git pull --rebase
          git push
